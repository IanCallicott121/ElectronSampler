<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron Sampler</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Segoe UI, Arial, sans-serif;
        background: linear-gradient(135deg, #f6f8ff, #e8eefc);
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
      }

      p {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello from Electron</h1>
      <p id="app-name"></p>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
